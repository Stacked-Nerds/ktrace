apiVersion: v1
kind: Namespace
metadata:
  name: ktrace-e2e
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: missing-secret
  namespace: ktrace-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: missing-secret
  template:
    metadata:
      labels:
        app: missing-secret
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          envFrom:
            - secretRef:
                name: does-not-exist
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: failing-init
  namespace: ktrace-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: failing-init
  template:
    metadata:
      labels:
        app: failing-init
    spec:
      initContainers:
        - name: migrate
          image: busybox:1.36
          command: ["sh", "-c", "echo migration failed >&2; exit 42"]
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: failing-probe
  namespace: ktrace-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: failing-probe
  template:
    metadata:
      labels:
        app: failing-probe
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          readinessProbe:
            exec:
              command: ["sh", "-c", "exit 1"]
            periodSeconds: 1
            failureThreshold: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-regression
  namespace: ktrace-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-regression
  template:
    metadata:
      labels:
        app: oom-regression
    spec:
      containers:
        - name: app
          image: python:3.13-alpine
          command: ["python", "-c"]
          args: ["x = bytearray(64 * 1024 * 1024); import time; time.sleep(3600)"]
          resources:
            requests:
              memory: 8Mi
            limits:
              memory: 16Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: failed-job
  namespace: ktrace-e2e
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "echo job failed >&2; exit 7"]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pending-storage
  namespace: ktrace-e2e
spec:
  serviceName: pending-storage
  replicas: 1
  selector:
    matchLabels:
      app: pending-storage
  template:
    metadata:
      labels:
        app: pending-storage
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: missing-storage-class
        resources:
          requests:
            storage: 1Mi
